name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build hatch-vcs
          python -m build

      - name: Resolve upload URL
        id: pkg-url
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          OWNER_TYPE=$(curl -s "https://api.github.com/users/${OWNER}" | python3 -c "import sys,json; print(json.load(sys.stdin)['type'])")
          PKG_NAME=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
          if [ "$OWNER_TYPE" = "Organization" ]; then
            URL="https://upload.pkg.github.com/orgs/${OWNER}/packages/pypi/${PKG_NAME}/"
          else
            URL="https://upload.pkg.github.com/user/packages/pypi/${PKG_NAME}/"
          fi
          echo "Resolved owner type: ${OWNER_TYPE}"
          echo "Resolved upload URL: ${URL}"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"

      - name: Publish to GitHub Packages
        run: |
          pip install twine
          twine upload --verbose --repository-url ${{ steps.pkg-url.outputs.url }} dist/*
        env:
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
