name: Publish to GitHub Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build hatch-vcs
          python -m build

      - name: Publish to GitHub Packages
        run: |
          pip install twine
          twine upload --repository-url "https://upload.pkg.github.com/${REPOSITORY}" dist/*
        env:
          REPOSITORY: ${{ github.repository }}
          TWINE_USERNAME: ${{ github.actor }}
          TWINE_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
